<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />		
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
	</head>
	<body>
	<button type="button" class="mt-2 btn btn-danger" data-bs-toggle="modal" data-bs-target="#exampleModal" data-bs-whatever="@mdo">Sign Up</button>

<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Create Account</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form>
         <label for="email" class="form-label">Email address</label>
		<input type="email" placeholder="Enter email" id="email" class="form-control" aria-describedby="passwordHelpBlock">
		<div id="passwordHelpBlock" class="form-text mb-2">
			  Your information is safe with us.
			</div>

		<label for="Password" class="form-label">Password</label>
     <input type="password" placeholder="Password" id="Password" class="form-control mb-3" aria-describedby="passwordHelpBlock">

			<label for="ConfirmPassword" class="form-label">Confirm Password</label>
     <input type="password" placeholder="Confirm Password" id="ConfirmPassword" class="form-control" aria-describedby="passwordHelpBlock">


			
			
        </form>
      </div>
      <div class="modal-footer">
        
        <button type="submit" class="btn btn-success">Submit</button>
      </div>
    </div>
  </div>
</div>
		
	 <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
		  <script type="text/javascript" src="./script.js"></script>
	</body>
</html>
